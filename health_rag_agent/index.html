        body {

```
    .container {
        max-width: 800px;
        margin: 40px auto;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #3a7bd5;
    }

    .chat-box {
        height: 500px;
        overflow-y: auto;
        padding: 10px;
        border-radius: 12px;
        background: #f0f7ff;
        margin-bottom: 15px;
    }

    .message {
        margin: 10px 0;
        display: flex;
    }

    .user {
        justify-content: flex-end;
    }

    .bot {
        justify-content: flex-start;
    }

    .bubble {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        line-height: 1.5;
    }

    .user .bubble {
        background: #3a7bd5;
        color: white;
    }

    .bot .bubble {
        background: #ffffff;
        border: 1px solid #d0e6ff;
    }

    .input-area {
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        background: #3a7bd5;
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #2c5fb2;
    }
</style>
```

</head>

<body>

<div class="container">
    <h1>🩺 健康RAG智能助手</h1>

```
<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input id="input" placeholder="请输入你的健康问题..." />
    <button onclick="sendMessage()">发送</button>
</div>
```

</div>

<script>
    const chatBox = document.getElementById("chatBox");

    function addMessage(text, role) {
        const msg = document.createElement("div");
        msg.className = "message " + role;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerText = text;

        msg.appendChild(bubble);
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        // 👉 先显示“思考中”
        const loadingMsg = document.createElement("div");
        loadingMsg.className = "message bot";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerText = "🤖 思考中...";
        loadingMsg.appendChild(bubble);
        chatBox.appendChild(loadingMsg);

        try {
            const response = await fetch(`http://127.0.0.1:8000/chat?query=${encodeURIComponent(text)}`);
            const data = await response.json();

            bubble.innerText = data.result;
        } catch (e) {
            bubble.innerText = "❌ 请求失败，请检查后端服务";
        }
    }
</script>

</body>
</html>
